<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2C6E63" />
    <title>MyChecklist — เช็คลิสต์ส่วนตัว</title>
    <meta name="description" content="แอปเช็คลิสต์ส่วนตัว ใช้คนเดียว ไม่มีเซิร์ฟเวอร์ ข้อมูลอยู่ในเครื่อง" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      // Apply saved appearance before first paint to avoid a flash.
      try {
        var s = JSON.parse(localStorage.getItem("mychecklist.settings.v1") || "{}");
        var r = document.documentElement;
        if (s.theme && s.theme !== "auto") r.dataset.theme = s.theme;
        if (s.accent && s.accent !== "green") r.dataset.accent = s.accent;
        if (s.fontSize && s.fontSize !== "normal") r.dataset.font = s.fontSize;
        if (s.density && s.density !== "comfortable") r.dataset.density = s.density;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div class="app">
      <!-- Slim sticky header -->
      <header class="header">
        <div class="header__top">
          <div class="header__left">
            <div class="header__today" id="todayLabel">—</div>
            <div class="header__summary" id="summaryLabel">กำลังโหลด…</div>
            <div class="header__stats" id="statsLabel"></div>
          </div>
          <div class="header__actions">
            <div class="ring" id="todayRing" hidden aria-label="ความคืบหน้าวันนี้"></div>
            <button class="icon-btn" id="settingsBtn" title="ตั้งค่า" aria-label="ตั้งค่า">⚙️</button>
            <button class="icon-btn" id="bellBtn" title="เปิดการแจ้งเตือน" aria-label="เปิดการแจ้งเตือน">🔔</button>
          </div>
        </div>
      </header>

      <!-- Compact toolbar: search + sort in one row -->
      <div class="toolbar" id="toolbar">
        <input
          type="search"
          id="searchInput"
          class="toolbar__search"
          placeholder="🔍 ค้นหางาน / แท็ก / โน้ต…"
          aria-label="ค้นหา"
        />
        <select class="sortselect" id="sortSelect" aria-label="จัดเรียง">
          <option value="date">เรียงตามวัน</option>
          <option value="important">สำคัญก่อน</option>
          <option value="created">เพิ่มล่าสุด</option>
        </select>
      </div>
      <div class="tagfilter" id="tagFilter" hidden></div>

      <!-- ===== LIST / DONE VIEW ===== -->
      <section id="listView">
        <main class="list" id="list" aria-live="polite"></main>
      </section>

      <!-- ===== CALENDAR VIEW ===== -->
      <section id="calView" hidden>
        <div class="cal__head">
          <button class="icon-btn" id="calPrev" aria-label="เดือนก่อนหน้า">‹</button>
          <div class="cal__title" id="calTitle">—</div>
          <button class="icon-btn" id="calNext" aria-label="เดือนถัดไป">›</button>
          <button class="btn btn--ghost cal__today" id="calToday">วันนี้</button>
        </div>
        <div class="cal__grid" id="calGrid"></div>
        <div class="cal__day" id="calDay"></div>
      </section>
    </div>

    <!-- Floating add button -->
    <button class="fab" id="fabAdd" aria-label="เพิ่มงานใหม่">＋</button>

    <!-- Bottom navigation -->
    <nav class="bottomnav" role="tablist">
      <button class="bottomnav__btn bottomnav__btn--active" id="navList" role="tab" aria-selected="true">
        <span class="bottomnav__ico">📋</span>
        <span>รายการ <span class="tab__count" id="openCount">0</span></span>
      </button>
      <button class="bottomnav__btn" id="navCal" role="tab" aria-selected="false">
        <span class="bottomnav__ico">📅</span>
        <span>ปฏิทิน</span>
      </button>
      <button class="bottomnav__btn" id="navDone" role="tab" aria-selected="false">
        <span class="bottomnav__ico">✅</span>
        <span>เสร็จแล้ว <span class="tab__count" id="doneCount" data-zero="true">0</span></span>
      </button>
    </nav>

    <div class="toast" id="toast" role="status" hidden></div>

    <!-- Quick-add bottom sheet -->
    <dialog class="sheet" id="addSheet">
      <form class="sheet__form" id="quickAddForm" autocomplete="off">
        <div class="sheet__head">
          <span class="sheet__title">เพิ่มงานใหม่</span>
          <span class="sheet__msg" id="sheetMsg"></span>
          <button type="button" class="sheet__close" id="sheetClose" aria-label="ปิด">✕</button>
        </div>
        <input
          class="quickadd__title"
          id="titleInput"
          type="text"
          placeholder="พิมพ์งานที่ต้องทำ แล้วกด Enter…"
          aria-label="ชื่องาน"
          required
        />
        <div class="chips" role="group" aria-label="เลือกวันด่วน">
          <button type="button" class="chip" data-quick="today">วันนี้</button>
          <button type="button" class="chip" data-quick="tomorrow">พรุ่งนี้</button>
          <button type="button" class="chip" data-quick="week">+7 วัน</button>
          <button type="button" class="chip" data-quick="none">ไม่มีกำหนด</button>
        </div>
        <div class="quickadd__grid">
          <label class="mini">
            <span>วันครบกำหนด</span>
            <input id="dateInput" type="date" />
          </label>
          <label class="mini">
            <span>เวลา (ไม่บังคับ)</span>
            <input id="timeInput" type="time" />
          </label>
          <label class="mini">
            <span>ทำซ้ำ</span>
            <select id="repeatInput">
              <option value="none">ไม่ซ้ำ</option>
              <option value="daily">ทุกวัน</option>
              <option value="weekly">ทุกสัปดาห์</option>
              <option value="monthly">ทุกเดือน</option>
              <option value="yearly">ทุกปี</option>
            </select>
          </label>
          <label class="mini">
            <span>แท็ก/อาคาร (ไม่บังคับ)</span>
            <input id="tagInput" type="text" placeholder="เช่น Maytree48" />
          </label>
        </div>
        <button class="quickadd__submit" type="submit">+ เพิ่มงาน</button>
      </form>
    </dialog>

    <!-- Edit dialog -->
    <dialog class="dialog" id="editDialog">
      <form method="dialog" class="dialog__form" id="editForm">
        <h2 class="dialog__title">แก้ไขงาน</h2>
        <label class="field">
          <span>ชื่องาน</span>
          <input type="text" id="editTitle" required />
        </label>
        <div class="field-row">
          <label class="field">
            <span>วันครบกำหนด</span>
            <input type="date" id="editDate" />
          </label>
          <label class="field">
            <span>เวลา</span>
            <input type="time" id="editTime" />
          </label>
        </div>
        <div class="snooze" role="group" aria-label="เลื่อนวัน">
          <span class="snooze__label">เลื่อนไป:</span>
          <button type="button" class="chip" data-snooze="tomorrow">พรุ่งนี้</button>
          <button type="button" class="chip" data-snooze="3">+3 วัน</button>
          <button type="button" class="chip" data-snooze="7">+7 วัน</button>
          <button type="button" class="chip" data-snooze="clear">ไม่มีกำหนด</button>
        </div>
        <div class="field-row">
          <label class="field">
            <span>ทำซ้ำ</span>
            <select id="editRepeat">
              <option value="none">ไม่ซ้ำ</option>
              <option value="daily">ทุกวัน</option>
              <option value="weekly">ทุกสัปดาห์</option>
              <option value="monthly">ทุกเดือน</option>
              <option value="yearly">ทุกปี</option>
            </select>
          </label>
          <label class="field">
            <span>เตือนล่วงหน้า</span>
            <select id="editLead">
              <option value="0">ตรงเวลา</option>
              <option value="1">1 ชั่วโมง</option>
              <option value="3">3 ชั่วโมง</option>
              <option value="24">1 วัน</option>
              <option value="72">3 วัน</option>
              <option value="168">1 สัปดาห์</option>
            </select>
          </label>
        </div>
        <label class="field">
          <span>แท็ก/อาคาร</span>
          <input type="text" id="editTag" />
        </label>
        <label class="field">
          <span>โน้ต</span>
          <textarea id="editNote" rows="2"></textarea>
        </label>

        <div class="field">
          <span>งานย่อย (เช็คลิสต์)</span>
          <div class="subtasks" id="subList"></div>
          <div class="subtasks__add">
            <input type="text" id="subInput" placeholder="เพิ่มงานย่อย…" />
            <button type="button" class="btn btn--ghost" id="subAddBtn">เพิ่ม</button>
          </div>
        </div>

        <label class="check-field">
          <input type="checkbox" id="editImportant" />
          <span>⭐ ทำเครื่องหมายว่าสำคัญ (ปักหมุดขึ้นบนสุด)</span>
        </label>

        <div class="dialog__actions">
          <button type="button" class="btn btn--danger" id="deleteBtn">ลบ</button>
          <div class="spacer"></div>
          <button type="button" class="btn btn--ghost" id="cancelBtn">ยกเลิก</button>
          <button type="submit" class="btn btn--primary">บันทึก</button>
        </div>
      </form>
    </dialog>

    <!-- Settings dialog -->
    <dialog class="dialog" id="settingsDialog">
      <form method="dialog" class="dialog__form">
        <h2 class="dialog__title">ตั้งค่า</h2>
        <label class="field">
          <span>ธีม</span>
          <select id="setTheme">
            <option value="auto">ตามระบบ</option>
            <option value="light">สว่าง</option>
            <option value="dark">มืด</option>
          </select>
        </label>
        <div class="field">
          <span>สีหลัก</span>
          <div class="swatches" id="setAccent">
            <button type="button" class="swatch" data-accent="green" style="--sw:#2c6e63" aria-label="เขียว"></button>
            <button type="button" class="swatch" data-accent="blue" style="--sw:#2f6fb0" aria-label="น้ำเงิน"></button>
            <button type="button" class="swatch" data-accent="purple" style="--sw:#7a4fb0" aria-label="ม่วง"></button>
            <button type="button" class="swatch" data-accent="orange" style="--sw:#c96a2b" aria-label="ส้ม"></button>
          </div>
        </div>
        <div class="field-row">
          <label class="field">
            <span>ขนาดตัวอักษร</span>
            <select id="setFont">
              <option value="normal">ปกติ</option>
              <option value="large">ใหญ่</option>
            </select>
          </label>
          <label class="field">
            <span>ความหนาแน่น</span>
            <select id="setDensity">
              <option value="comfortable">สบายตา</option>
              <option value="compact">กะทัดรัด</option>
            </select>
          </label>
        </div>
        <div class="field">
          <span>ช่วงเวลาเงียบ (พักการเตือน)</span>
          <label class="check-field">
            <input type="checkbox" id="setQuietOn" />
            <span>เปิด — งานที่ถึงกำหนดช่วงนี้จะรอเตือนตอนหมดช่วง</span>
          </label>
          <div class="field-row">
            <label class="field">
              <span>ตั้งแต่</span>
              <input type="time" id="setQuietFrom" value="21:00" />
            </label>
            <label class="field">
              <span>ถึง</span>
              <input type="time" id="setQuietTo" value="07:00" />
            </label>
          </div>
        </div>
        <label class="field">
          <span>รูปแบบการเตือนซ้ำ</span>
          <select id="setReminderRepeat">
            <option value="daily">เตือนทุกวันจนกว่าจะทำเสร็จ</option>
            <option value="once">เตือนครั้งเดียว</option>
          </select>
        </label>
        <label class="field">
          <span>เตือนล่วงหน้าเริ่มต้น (สำหรับงานใหม่)</span>
          <select id="setLead">
            <option value="0">ตรงเวลา</option>
            <option value="1">1 ชั่วโมง</option>
            <option value="3">3 ชั่วโมง</option>
            <option value="24">1 วัน</option>
          </select>
        </label>
        <label class="field">
          <span>วันเริ่มต้นสัปดาห์ (ปฏิทิน)</span>
          <select id="setWeekStart">
            <option value="1">จันทร์</option>
            <option value="0">อาทิตย์</option>
          </select>
        </label>

        <div class="field">
          <span>ข้อมูล</span>
          <div class="datarow">
            <button type="button" class="btn" id="exportBtn">⬇︎ สำรอง</button>
            <button type="button" class="btn" id="importBtn">⬆︎ กู้ข้อมูล</button>
            <button type="button" class="btn" id="icsBtn">📆 .ics</button>
            <button type="button" class="btn" id="pasteImportBtn">📋 นำเข้ากิจกรรม</button>
          </div>
          <p class="hint">ข้อมูลเก็บในเครื่องนี้เท่านั้น — ควรสำรองเป็นระยะ</p>
        </div>
        <input type="file" id="importFile" accept="application/json" hidden />

        <div class="dialog__actions">
          <button type="button" class="btn btn--danger" id="clearAllBtn">ล้างข้อมูลทั้งหมด</button>
          <div class="spacer"></div>
          <button type="submit" class="btn btn--primary">ปิด</button>
        </div>
      </form>
    </dialog>

    <!-- Import-from-paste dialog -->
    <dialog class="dialog" id="importDialog">
      <form method="dialog" class="dialog__form" id="importForm">
        <h2 class="dialog__title">นำเข้ากิจกรรม</h2>
        <p class="hint">
          วางตารางจาก Excel/LINE (คั่นด้วย Tab หรือ “|”) — คอลัมน์: วันที่, หัวข้อ, รายละเอียด, ประเภท
        </p>
        <textarea id="pasteArea" rows="5" class="paste"
          placeholder="27 มิ.ย. 2569&#9;ชุดลูกเสือ&#9;อย่าลืมหมวก&#9;กิจกรรม"></textarea>
        <div class="field-row">
          <label class="field">
            <span>ใส่แท็กให้ทุกงาน</span>
            <input type="text" id="importTag" value="ลูก" />
          </label>
          <label class="field">
            <span>เตือนล่วงหน้า (งานสอบ/ส่งงาน)</span>
            <select id="importLead">
              <option value="24">1 วัน</option>
              <option value="0">ตรงเวลา</option>
              <option value="72">3 วัน</option>
              <option value="168">1 สัปดาห์</option>
            </select>
          </label>
        </div>
        <label class="check-field">
          <input type="checkbox" id="importBE" checked />
          <span>ปีเป็น พ.ศ. (แปลงเป็น ค.ศ. อัตโนมัติ)</span>
        </label>
        <div class="dialog__actions">
          <button type="button" class="btn btn--ghost" id="importPreviewBtn">ดูตัวอย่าง</button>
          <div class="spacer"></div>
          <button type="button" class="btn btn--ghost" id="importCancelBtn">ปิด</button>
        </div>
        <div class="import-preview" id="importPreview"></div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
